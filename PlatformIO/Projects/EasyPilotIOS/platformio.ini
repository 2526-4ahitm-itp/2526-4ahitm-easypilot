[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; Geschwindigkeit für den Seriellen Monitor
monitor_speed = 115200

; Turbo-Upload per USB
upload_speed = 921600

; EXTREM WICHTIG FÜR DEN C3 SUPERMINI: 
; Zwingt den Chip, den USB-C Port für Daten & Seriellen Monitor zu nutzen
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1